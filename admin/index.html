<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Lunar Eternal Music Group</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#050712;--surface:#080E22;--card:#0C1330;--gold:#C4A35A;
      --gold-dim:rgba(196,163,90,0.15);--silver:#94A3B8;--text:#EEF2FF;
      --muted:#4A5568;--border:rgba(196,163,90,0.15);--red:#EF4444;--green:#22C55E;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}

    /* Login */
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:380px;text-align:center}
    .login-card h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;font-style:italic;color:var(--gold);margin-bottom:0.25rem}
    .login-card p{color:var(--muted);font-size:0.85rem;margin-bottom:2rem}
    .error-msg{color:var(--red);font-size:0.8rem;margin-top:0.5rem;min-height:1.2rem}

    /* Admin */
    #admin-screen{display:none}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header-logo{display:flex;align-items:center;gap:0.6rem}
    .header-logo span{font-size:1.2rem;color:var(--gold)}
    .header-logo h1{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;letter-spacing:0.15em}
    .header-sub{font-size:0.65rem;color:var(--gold);letter-spacing:0.2em;text-transform:uppercase}
    .header-right{display:flex;align-items:center;gap:1rem}
    .user-pill{background:rgba(196,163,90,0.1);border:1px solid var(--border);border-radius:100px;padding:0.35rem 0.9rem;font-size:0.8rem}

    /* Layout */
    .admin-body{display:flex;min-height:calc(100vh - 57px)}
    .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:1.5rem 1rem;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
    .sidebar-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.75rem;padding:0 0.5rem}
    .sidebar-section{margin-bottom:2rem}
    .nav-item{display:flex;align-items:center;gap:0.6rem;padding:0.6rem 0.75rem;border-radius:10px;color:var(--muted);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.2s;width:100%;background:none;border:none;font-family:'Space Grotesk',sans-serif;text-align:left}
    .nav-item:hover{background:var(--gold-dim);color:var(--text)}
    .nav-item.active{background:var(--gold-dim);color:var(--gold)}
    .nav-item .icon{font-size:1rem;width:20px;text-align:center}
    .main-content{flex:1;padding:2rem;overflow-y:auto}

    /* Panels */
    .panel{display:none;animation:fadeIn 0.3s ease}
    .panel.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* Section header */
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
    .section-header h2{font-size:1.1rem;font-weight:600}

    /* Buttons */
    button{font-family:'Space Grotesk',sans-serif;cursor:pointer;border:none;transition:all 0.2s}
    .btn-primary{background:var(--gold);color:var(--bg);padding:0.7rem 1.5rem;border-radius:10px;font-size:0.9rem;font-weight:700}
    .btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
    .btn-add{background:var(--gold);color:var(--bg);padding:0.5rem 1.2rem;border-radius:100px;font-size:0.85rem;font-weight:700}
    .btn-add:hover{opacity:0.9}
    .btn-sm{padding:0.35rem 0.8rem;border-radius:6px;font-size:0.78rem;font-weight:500}
    .btn-edit{background:rgba(196,163,90,0.1);color:var(--gold);border:1px solid var(--border)}
    .btn-edit:hover{background:rgba(196,163,90,0.2)}
    .btn-delete{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
    .btn-delete:hover{background:rgba(239,68,68,0.2)}
    .btn-cancel{background:rgba(107,104,128,0.15);color:var(--muted);padding:0.6rem 1.2rem;border-radius:10px;font-size:0.9rem}
    .btn-save{background:var(--gold);color:var(--bg);padding:0.6rem 1.5rem;border-radius:10px;font-size:0.9rem;font-weight:700}
    .btn-logout{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);padding:0.4rem 1rem;border-radius:100px;font-size:0.8rem}

    /* Inputs */
    input,select,textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s}
    input:focus,select:focus,textarea:focus{border-color:var(--gold)}
    textarea{resize:vertical;min-height:100px}
    label{font-size:0.78rem;color:var(--muted);font-weight:500;display:block;margin-bottom:0.4rem}

    /* Artist grid */
    .artist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
    .artist-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;transition:border-color 0.2s}
    .artist-card:hover{border-color:var(--gold)}
    .artist-card-top{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
    .artist-photo{width:64px;height:64px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--gold);flex-shrink:0;overflow:hidden}
    .artist-photo img{width:100%;height:100%;object-fit:cover}
    .artist-info h3{font-size:0.95rem;font-weight:600;margin-bottom:0.2rem}
    .artist-info .genre{font-size:0.75rem;color:var(--muted)}
    .artist-socials{display:flex;flex-wrap:wrap;gap:0.35rem;margin-bottom:1rem}
    .social-tag{font-size:0.68rem;padding:0.2rem 0.5rem;border-radius:100px;background:var(--gold-dim);color:var(--gold);border:1px solid var(--border)}
    .card-actions{display:flex;gap:0.5rem}
    .featured-badge{font-size:0.65rem;padding:0.15rem 0.5rem;border-radius:100px;background:var(--gold);color:var(--bg);font-weight:700;margin-left:auto}

    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;padding:1rem}
    .modal-overlay.open{display:flex}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
    .modal h2{font-size:1.1rem;font-weight:600;margin-bottom:1.5rem}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
    .form-group{display:flex;flex-direction:column;gap:0.4rem}
    .form-group.full{grid-column:1/-1}
    .modal-actions{display:flex;gap:0.75rem;margin-top:1.5rem;justify-content:flex-end}

    /* Photo upload */
    .photo-upload{border:2px dashed var(--border);border-radius:12px;padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:0.75rem}
    .photo-upload:hover{border-color:var(--gold);background:var(--gold-dim)}
    .photo-upload p{color:var(--muted);font-size:0.85rem;margin-top:0.5rem}
    .photo-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 0.5rem;display:block;border:2px solid var(--gold)}

    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem}
    .stat-card .label{font-size:0.75rem;color:var(--muted);margin-bottom:0.5rem}
    .stat-card .value{font-size:1.8rem;font-weight:700;color:var(--gold)}

    .loading{color:var(--muted);font-size:0.9rem;padding:2rem;text-align:center}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem}

    @media(max-width:768px){.sidebar{display:none}.form-grid{grid-template-columns:1fr}.main-content{padding:1rem}}
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <span style="font-size:2rem;color:var(--gold)">☾</span>
    <h1>Lunar Eternal</h1>
    <p>Admin Console — Music Group</p>
    <div class="form-group" style="text-align:left;margin-bottom:0.75rem">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com" />
    </div>
    <div class="form-group" style="text-align:left;margin-bottom:1rem">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="btn-primary" style="width:100%;margin-top:0.5rem" onclick="login()">Sign In</button>
  </div>
</div>

<!-- Admin -->
<div id="admin-screen">
  <header>
    <div class="header-logo">
      <span>☾</span>
      <div>
        <h1>LUNAR ETERNAL</h1>
        <div class="header-sub">Admin Console</div>
      </div>
    </div>
    <div class="header-right">
      <span class="user-pill" id="user-pill">—</span>
      <a href="/" style="color:var(--silver);font-size:0.8rem;text-decoration:none">← Main Site</a>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </header>

  <div class="admin-body">
    <nav class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Content</div>
        <button class="nav-item active" onclick="showPanel('artists', this)"><span class="icon">🎤</span> Artists</button>
        <button class="nav-item" onclick="showPanel('releases', this)"><span class="icon">💿</span> Releases</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Overview</div>
        <button class="nav-item" onclick="showPanel('dashboard', this)"><span class="icon">📊</span> Dashboard</button>
      </div>
    </nav>

    <div class="main-content">

      <!-- Artists Panel -->
      <div class="panel active" id="panel-artists">
        <div class="section-header">
          <h2>Artists</h2>
          <button class="btn-add" onclick="openArtistModal()">+ Add Artist</button>
        </div>
        <div class="artist-grid" id="artists-list"><div class="loading">Loading...</div></div>
      </div>

      <!-- Releases Panel -->
      <div class="panel" id="panel-releases">
        <div class="section-header">
          <h2>Releases</h2>
          <button class="btn-add" onclick="openReleaseModal()">+ Add Release</button>
        </div>
        <div class="artist-grid" id="releases-list"><div class="loading">Loading...</div></div>
      </div>

      <!-- Dashboard Panel -->
      <div class="panel" id="panel-dashboard">
        <div class="section-header"><h2>Overview</h2></div>
        <div class="stats-grid">
          <div class="stat-card"><div class="label">Total Artists</div><div class="value" id="stat-artists">—</div></div>
          <div class="stat-card"><div class="label">Featured</div><div class="value" id="stat-featured">—</div></div>
          <div class="stat-card"><div class="label">With Photos</div><div class="value" id="stat-photos">—</div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Release Modal -->
<div class="modal-overlay" id="release-modal">
  <div class="modal">
    <h2 id="release-modal-title">Add Release</h2>
    <input type="hidden" id="r-id" />

    <div class="form-group full" style="margin-bottom:1rem">
      <label>Cover Art</label>
      <div class="photo-upload" onclick="document.getElementById('cover-input').click()" id="cover-drop">
        <img id="cover-preview" src="" alt="" style="display:none;width:80px;height:80px;object-fit:cover;border-radius:8px;margin:0 auto" />
        <span id="cover-icon" style="font-size:2rem">🎵</span>
        <p id="cover-text">Click to upload cover art</p>
      </div>
      <input type="file" id="cover-input" accept="image/*" style="display:none" onchange="previewCover(this)" />
    </div>

    <div class="form-grid">
      <div class="form-group full"><label>Title *</label><input type="text" id="r-title" placeholder="Your Love" /></div>
      <div class="form-group full"><label>Artists *</label><input type="text" id="r-artists" placeholder="ΛLΞSS1Λ, Robynson Le Tissier" /></div>
      <div class="form-group"><label>Genre</label><input type="text" id="r-genre" placeholder="Tech House" /></div>
      <div class="form-group"><label>Release Date</label><input type="date" id="r-date" /></div>
      <div class="form-group"><label>Order</label><input type="number" id="r-order" placeholder="0" /></div>
      <div class="form-group"><label>Featured?</label>
        <select id="r-featured">
          <option value="false">No</option>
          <option value="true">Yes</option>
        </select>
      </div>

      <div class="form-group full" style="border-top:1px solid var(--border);padding-top:1rem;margin-top:0.5rem">
        <label style="color:var(--gold);margin-bottom:0.75rem">Streaming Links</label>
      </div>
      <div class="form-group"><label>Spotify</label><input type="url" id="r-spotify" placeholder="https://open.spotify.com/..." /></div>
      <div class="form-group"><label>Apple Music</label><input type="url" id="r-apple" placeholder="https://music.apple.com/..." /></div>
      <div class="form-group"><label>Beatport</label><input type="url" id="r-beatport" placeholder="https://beatport.com/..." /></div>
      <div class="form-group"><label>YouTube</label><input type="url" id="r-youtube" placeholder="https://youtube.com/..." /></div>
      <div class="form-group"><label>SoundCloud</label><input type="url" id="r-soundcloud" placeholder="https://soundcloud.com/..." /></div>
      <div class="form-group"><label>Tidal</label><input type="url" id="r-tidal" placeholder="https://tidal.com/..." /></div>
      <div class="form-group"><label>Amazon Music</label><input type="url" id="r-amazon" placeholder="https://music.amazon.com/..." /></div>
      <div class="form-group"><label>Hypeddit / Smart Link</label><input type="url" id="r-hypeddit" placeholder="https://..." /></div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('release-modal')">Cancel</button>
      <button class="btn-save" onclick="saveRelease()">Save Release</button>
    </div>
  </div>
</div>

<!-- Artist Modal -->
<div class="modal-overlay" id="artist-modal">
  <div class="modal">
    <h2 id="artist-modal-title">Add Artist</h2>
    <input type="hidden" id="a-id" />

    <div class="form-group full" style="margin-bottom:1rem">
      <label>Profile Photo</label>
      <div class="photo-upload" onclick="document.getElementById('photo-input').click()" id="photo-drop">
        <img id="photo-preview" src="" alt="" style="display:none" class="photo-preview" />
        <span id="photo-icon" style="font-size:2rem">📷</span>
        <p id="photo-text">Click to upload photo</p>
      </div>
      <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="previewPhoto(this)" />
    </div>

    <div class="form-grid">
      <div class="form-group full"><label>Artist Name *</label><input type="text" id="a-name" placeholder="ΛLΞSS1Λ" /></div>
      <div class="form-group full"><label>Slug * (URL-friendly, no spaces)</label><input type="text" id="a-slug" placeholder="alessia" /></div>
      <div class="form-group"><label>Genre</label><input type="text" id="a-genre" placeholder="Dream House · Dream Trance" /></div>
      <div class="form-group"><label>Order (for sorting)</label><input type="number" id="a-order" placeholder="0" /></div>
      <div class="form-group full"><label>Bio</label><textarea id="a-bio" placeholder="Artist bio..."></textarea></div>
      <div class="form-group full"><label>Featured on homepage?</label>
        <select id="a-featured">
          <option value="false">No</option>
          <option value="true">Yes</option>
        </select>
      </div>
      <div class="form-group full" style="border-top:1px solid var(--border);padding-top:1rem;margin-top:0.5rem">
        <label style="color:var(--gold);margin-bottom:0.75rem">Social Links</label>
      </div>
      <div class="form-group"><label>Spotify</label><input type="url" id="a-spotify" placeholder="https://open.spotify.com/artist/..." /></div>
      <div class="form-group"><label>Instagram</label><input type="url" id="a-instagram" placeholder="https://instagram.com/..." /></div>
      <div class="form-group"><label>YouTube</label><input type="url" id="a-youtube" placeholder="https://youtube.com/..." /></div>
      <div class="form-group"><label>TikTok</label><input type="url" id="a-tiktok" placeholder="https://tiktok.com/..." /></div>
      <div class="form-group"><label>SoundCloud</label><input type="url" id="a-soundcloud" placeholder="https://soundcloud.com/..." /></div>
      <div class="form-group"><label>Beatport</label><input type="url" id="a-beatport" placeholder="https://beatport.com/artist/..." /></div>
      <div class="form-group full"><label>Personal Website</label><input type="url" id="a-website" placeholder="https://..." /></div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('artist-modal')">Cancel</button>
      <button class="btn-save" onclick="saveArtist()">Save Artist</button>
    </div>
  </div>
</div>

<script>
  const WORKER_URL = 'https://alessia-portal-worker.musicrecordings123.workers.dev';
  const SUPABASE_URL = 'https://muvrnpymdzpfwjevlmna.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11dnJucHltZHpwZndqZXZsbW5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMDk1MzMsImV4cCI6MjA5ODU4NTUzM30.8mRJ9SoJ-E1nW0AMyZRwAQ8dzkqH4MYSRWYwcEwoNCw';

  let sessionToken = null;
  let currentUser = null;
  let pendingPhotoFile = null;

  // ── Auth ──────────────────────────────────────────────────
  async function login() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    document.getElementById('login-error').textContent = '';
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!data.access_token) { document.getElementById('login-error').textContent = 'Wrong email or password.'; return; }
    sessionToken = data.access_token;
    const me = await api('GET', '/me');
    if (!me?.profile || me.profile.role !== 'admin') {
      document.getElementById('login-error').textContent = 'Admin access only.';
      sessionToken = null; return;
    }
    currentUser = me;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    document.getElementById('user-pill').textContent = currentUser.profile.artist_name;
    loadArtists();
    loadDashboard();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') login();
  });

  function logout() {
    sessionToken = null; currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-screen').style.display = 'none';
  }

  // ── API ───────────────────────────────────────────────────
  async function api(method, path, body) {
    try {
      const res = await fetch(WORKER_URL + path, {
        method,
        headers: { 'Authorization': `Bearer ${sessionToken}`, 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      });
      return res.json();
    } catch(e) { console.error(e); return null; }
  }

  // ── Navigation ────────────────────────────────────────────
  function showPanel(panel, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + panel).classList.add('active');
    btn.classList.add('active');
    if (panel === 'artists') loadArtists();
    if (panel === 'releases') loadReleases();
    if (panel === 'dashboard') loadDashboard();
  }

  // ── Dashboard ─────────────────────────────────────────────
  async function loadDashboard() {
    const artists = await api('GET', '/artists');
    if (!artists) return;
    document.getElementById('stat-artists').textContent = artists.length;
    document.getElementById('stat-featured').textContent = artists.filter(a => a.featured).length;
    document.getElementById('stat-photos').textContent = artists.filter(a => a.photo_key).length;
  }

  // ── Releases ──────────────────────────────────────────────
  let pendingCoverFile = null;

  async function loadReleases() {
    const releases = await api('GET', '/label-releases');
    const el = document.getElementById('releases-list');
    if (!releases?.length) { el.innerHTML = '<div class="loading">No releases yet.</div>'; return; }
    el.innerHTML = releases.map(r => `
      <div class="artist-card">
        <div class="artist-card-top">
          <div class="artist-photo" id="rcover-${r.id}" style="border-radius:8px;font-size:1.5rem">${r.cover_emoji || '🎵'}</div>
          <div class="artist-info">
            <h3>${r.title}</h3>
            <div class="genre">${r.artists}</div>
            <div class="genre">${r.genre || ''} ${r.release_date ? '· ' + new Date(r.release_date).toLocaleDateString('nl-NL', {day:'numeric',month:'long',year:'numeric'}) : ''}</div>
          </div>
        </div>
        <div class="artist-socials">
          ${r.spotify_url ? '<span class="social-tag">Spotify</span>' : ''}
          ${r.apple_music_url ? '<span class="social-tag">Apple Music</span>' : ''}
          ${r.beatport_url ? '<span class="social-tag">Beatport</span>' : ''}
          ${r.youtube_url ? '<span class="social-tag">YouTube</span>' : ''}
          ${r.soundcloud_url ? '<span class="social-tag">SoundCloud</span>' : ''}
          ${r.tidal_url ? '<span class="social-tag">Tidal</span>' : ''}
          ${r.amazon_music_url ? '<span class="social-tag">Amazon</span>' : ''}
          ${r.hypeddit_url ? '<span class="social-tag">Smart Link</span>' : ''}
        </div>
        <div class="card-actions" style="margin-top:1rem">
          <button class="btn-sm btn-edit" onclick='editRelease(${JSON.stringify(r).replace(/'/g, "&#39;")})'>Edit</button>
          <button class="btn-sm btn-delete" onclick="deleteRelease('${r.id}', '${r.title}')">Delete</button>
        </div>
      </div>`).join('');
    // Load covers
    for (const r of releases) {
      if (!r.cover_key) continue;
      try {
        const res = await fetch(`${WORKER_URL}/file/${encodeURIComponent(r.cover_key)}`, { headers: { 'Authorization': `Bearer ${sessionToken}` } });
        if (!res.ok) continue;
        const blob = await res.blob();
        const el = document.getElementById(`rcover-${r.id}`);
        if (el) el.innerHTML = `<img src="${URL.createObjectURL(blob)}" style="width:100%;height:100%;object-fit:cover;border-radius:8px" />`;
      } catch(e) {}
    }
  }

  function openReleaseModal() {
    document.getElementById('release-modal-title').textContent = 'Add Release';
    ['r-id','r-title','r-artists','r-genre','r-date','r-spotify','r-apple','r-beatport','r-youtube','r-soundcloud','r-tidal','r-amazon','r-hypeddit'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('r-order').value = '0';
    document.getElementById('r-featured').value = 'false';
    document.getElementById('cover-preview').style.display = 'none';
    document.getElementById('cover-icon').style.display = 'block';
    document.getElementById('cover-text').textContent = 'Click to upload cover art';
    pendingCoverFile = null;
    document.getElementById('release-modal').classList.add('open');
  }

  function editRelease(r) {
    document.getElementById('release-modal-title').textContent = 'Edit Release';
    document.getElementById('r-id').value = r.id || '';
    document.getElementById('r-title').value = r.title || '';
    document.getElementById('r-artists').value = r.artists || '';
    document.getElementById('r-genre').value = r.genre || '';
    document.getElementById('r-date').value = r.release_date || '';
    document.getElementById('r-order').value = r.order_index || 0;
    document.getElementById('r-featured').value = r.featured ? 'true' : 'false';
    document.getElementById('r-spotify').value = r.spotify_url || '';
    document.getElementById('r-apple').value = r.apple_music_url || '';
    document.getElementById('r-beatport').value = r.beatport_url || '';
    document.getElementById('r-youtube').value = r.youtube_url || '';
    document.getElementById('r-soundcloud').value = r.soundcloud_url || '';
    document.getElementById('r-tidal').value = r.tidal_url || '';
    document.getElementById('r-amazon').value = r.amazon_music_url || '';
    document.getElementById('r-hypeddit').value = r.hypeddit_url || '';
    document.getElementById('cover-preview').style.display = 'none';
    document.getElementById('cover-icon').style.display = 'block';
    document.getElementById('cover-text').textContent = r.cover_key ? '✅ Cover uploaded — click to change' : 'Click to upload cover art';
    pendingCoverFile = null;
    document.getElementById('release-modal').classList.add('open');
  }

  function previewCover(input) {
    const file = input.files[0];
    if (!file) return;
    pendingCoverFile = file;
    const preview = document.getElementById('cover-preview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    document.getElementById('cover-icon').style.display = 'none';
    document.getElementById('cover-text').textContent = file.name;
  }

  async function saveRelease() {
    const id = document.getElementById('r-id').value;
    const body = {
      title: document.getElementById('r-title').value,
      artists: document.getElementById('r-artists').value,
      genre: document.getElementById('r-genre').value,
      release_date: document.getElementById('r-date').value || null,
      order_index: parseInt(document.getElementById('r-order').value) || 0,
      featured: document.getElementById('r-featured').value === 'true',
      spotify_url: document.getElementById('r-spotify').value || null,
      apple_music_url: document.getElementById('r-apple').value || null,
      beatport_url: document.getElementById('r-beatport').value || null,
      youtube_url: document.getElementById('r-youtube').value || null,
      soundcloud_url: document.getElementById('r-soundcloud').value || null,
      tidal_url: document.getElementById('r-tidal').value || null,
      amazon_music_url: document.getElementById('r-amazon').value || null,
      hypeddit_url: document.getElementById('r-hypeddit').value || null,
    };

    let savedId = id;
    if (id) {
      await api('PUT', `/label-releases/${id}`, body);
    } else {
      const res = await api('POST', '/label-releases', body);
      savedId = res?.[0]?.id || res?.id;
    }

    if (pendingCoverFile && savedId) {
      const form = new FormData();
      form.append('file', pendingCoverFile);
      form.append('releaseId', savedId);
      const res = await fetch(WORKER_URL + '/release-cover', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${sessionToken}` },
        body: form,
      });
      const data = await res.json();
      if (data.key) await api('PUT', `/label-releases/${savedId}`, { cover_key: data.key });
      pendingCoverFile = null;
    }

    closeModal('release-modal');
    loadReleases();
    loadDashboard();
  }

  async function deleteRelease(id, title) {
    if (!confirm(`Delete "${title}"?`)) return;
    await api('DELETE', `/label-releases/${id}`);
    loadReleases();
    loadDashboard();
  }

  // ── Artists ───────────────────────────────────────────────
  async function loadArtists() {
    const artists = await api('GET', '/artists');
    const el = document.getElementById('artists-list');
    if (!artists?.length) { el.innerHTML = '<div class="loading">No artists yet. Add your first one!</div>'; return; }
    el.innerHTML = artists.map(a => artistCardHTML(a)).join('');
    loadArtistPhotos(artists);
  }

  function artistCardHTML(a) {
    const socials = [
      a.spotify_url && 'Spotify', a.instagram_url && 'Instagram',
      a.youtube_url && 'YouTube', a.tiktok_url && 'TikTok',
      a.soundcloud_url && 'SoundCloud', a.beatport_url && 'Beatport',
      a.website_url && 'Website'
    ].filter(Boolean);
    return `
      <div class="artist-card">
        <div class="artist-card-top">
          <div class="artist-photo" id="photo-${a.id}">${a.name.charAt(0)}</div>
          <div class="artist-info">
            <h3>${a.name} ${a.featured ? '<span class="featured-badge">Featured</span>' : ''}</h3>
            <div class="genre">${a.genre || 'No genre set'}</div>
          </div>
        </div>
        ${a.bio ? `<p style="font-size:0.82rem;color:var(--silver);line-height:1.7;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${a.bio}</p>` : ''}
        ${socials.length ? `<div class="artist-socials">${socials.map(s => `<span class="social-tag">${s}</span>`).join('')}</div>` : ''}
        <div class="card-actions">
          <button class="btn-sm btn-edit" onclick='editArtist(${JSON.stringify(a).replace(/'/g, "&#39;")})'>Edit</button>
          <button class="btn-sm btn-delete" onclick="deleteArtist('${a.id}', '${a.name}')">Delete</button>
        </div>
      </div>`;
  }

  async function loadArtistPhotos(artists) {
    for (const a of artists) {
      if (!a.photo_key) continue;
      try {
        const res = await fetch(`${WORKER_URL}/file/${encodeURIComponent(a.photo_key)}`, {
          headers: { 'Authorization': `Bearer ${sessionToken}` }
        });
        if (!res.ok) continue;
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const el = document.getElementById(`photo-${a.id}`);
        if (el) el.innerHTML = `<img src="${url}" alt="${a.name}" />`;
      } catch(e) {}
    }
  }

  // ── Artist Modal ──────────────────────────────────────────
  function openArtistModal() {
    document.getElementById('artist-modal-title').textContent = 'Add Artist';
    document.getElementById('a-id').value = '';
    document.getElementById('a-name').value = '';
    document.getElementById('a-slug').value = '';
    document.getElementById('a-genre').value = '';
    document.getElementById('a-bio').value = '';
    document.getElementById('a-order').value = '0';
    document.getElementById('a-featured').value = 'false';
    document.getElementById('a-spotify').value = '';
    document.getElementById('a-instagram').value = '';
    document.getElementById('a-youtube').value = '';
    document.getElementById('a-tiktok').value = '';
    document.getElementById('a-soundcloud').value = '';
    document.getElementById('a-beatport').value = '';
    document.getElementById('a-website').value = '';
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('photo-icon').style.display = 'block';
    document.getElementById('photo-text').textContent = 'Click to upload photo';
    pendingPhotoFile = null;
    document.getElementById('artist-modal').classList.add('open');
  }

  function editArtist(a) {
    document.getElementById('artist-modal-title').textContent = 'Edit Artist';
    document.getElementById('a-id').value = a.id;
    document.getElementById('a-name').value = a.name || '';
    document.getElementById('a-slug').value = a.slug || '';
    document.getElementById('a-genre').value = a.genre || '';
    document.getElementById('a-bio').value = a.bio || '';
    document.getElementById('a-order').value = a.order_index || 0;
    document.getElementById('a-featured').value = a.featured ? 'true' : 'false';
    document.getElementById('a-spotify').value = a.spotify_url || '';
    document.getElementById('a-instagram').value = a.instagram_url || '';
    document.getElementById('a-youtube').value = a.youtube_url || '';
    document.getElementById('a-tiktok').value = a.tiktok_url || '';
    document.getElementById('a-soundcloud').value = a.soundcloud_url || '';
    document.getElementById('a-beatport').value = a.beatport_url || '';
    document.getElementById('a-website').value = a.website_url || '';
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('photo-icon').style.display = 'block';
    document.getElementById('photo-text').textContent = a.photo_key ? '✅ Photo uploaded — click to change' : 'Click to upload photo';
    pendingPhotoFile = null;
    document.getElementById('artist-modal').classList.add('open');
  }

  function previewPhoto(input) {
    const file = input.files[0];
    if (!file) return;
    pendingPhotoFile = file;
    const url = URL.createObjectURL(file);
    const preview = document.getElementById('photo-preview');
    preview.src = url;
    preview.style.display = 'block';
    document.getElementById('photo-icon').style.display = 'none';
    document.getElementById('photo-text').textContent = file.name;
  }

  // Auto-generate slug from name
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('a-name').addEventListener('input', function() {
      if (!document.getElementById('a-id').value) {
        document.getElementById('a-slug').value = this.value.toLowerCase()
          .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      }
    });
  });

  async function saveArtist() {
    const id = document.getElementById('a-id').value;
    const body = {
      name: document.getElementById('a-name').value,
      slug: document.getElementById('a-slug').value,
      genre: document.getElementById('a-genre').value,
      bio: document.getElementById('a-bio').value,
      order_index: parseInt(document.getElementById('a-order').value) || 0,
      featured: document.getElementById('a-featured').value === 'true',
      spotify_url: document.getElementById('a-spotify').value || null,
      instagram_url: document.getElementById('a-instagram').value || null,
      youtube_url: document.getElementById('a-youtube').value || null,
      tiktok_url: document.getElementById('a-tiktok').value || null,
      soundcloud_url: document.getElementById('a-soundcloud').value || null,
      beatport_url: document.getElementById('a-beatport').value || null,
      website_url: document.getElementById('a-website').value || null,
    };

    let savedId = id;

    if (id) {
      await api('PUT', `/artists/${id}`, body);
    } else {
      const res = await api('POST', '/artists', body);
      savedId = res?.[0]?.id || res?.id;
    }

    // Upload photo if pending
    if (pendingPhotoFile && savedId) {
      const form = new FormData();
      form.append('file', pendingPhotoFile);
      form.append('artistId', savedId);
      const photoRes = await fetch(WORKER_URL + '/artist-photo', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${sessionToken}` },
        body: form,
      });
      const photoData = await photoRes.json();
      if (photoData.key) {
        await api('PUT', `/artists/${savedId}`, { photo_key: photoData.key });
      }
    }

    closeModal('artist-modal');
    loadArtists();
    loadDashboard();
  }

  async function deleteArtist(id, name) {
    if (!confirm(`Delete ${name}? This cannot be undone.`)) return;
    await api('DELETE', `/artists/${id}`);
    loadArtists();
    loadDashboard();
  }

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
</script>
</body>
</html>
