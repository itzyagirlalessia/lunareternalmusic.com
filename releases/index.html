<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Releases — Lunar Eternal Music Group</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#050712;--surface:#080E22;--card:#0C1330;--gold:#C4A35A;--gold-dim:rgba(196,163,90,0.15);--silver:#94A3B8;--text:#EEF2FF;--muted:#4A5568;--border:rgba(196,163,90,0.15)}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
    .star{position:absolute;border-radius:50%;background:#fff;opacity:0;animation:twinkle var(--d) var(--delay) infinite ease-in-out}
    @keyframes twinkle{0%,100%{opacity:0;transform:scale(0.5)}50%{opacity:0.6;transform:scale(1.1)}}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.25rem 3rem;background:rgba(5,7,18,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .logo{display:flex;align-items:center;gap:0.75rem;text-decoration:none}
    .logo-icon{font-size:1.5rem;color:var(--gold)}
    .logo-text{display:flex;flex-direction:column}
    .logo-main{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;letter-spacing:0.2em;color:var(--text)}
    .logo-sub{font-size:0.55rem;letter-spacing:0.25em;color:var(--gold);text-transform:uppercase}
    .nav-links{display:flex;gap:2rem}
    .nav-links a{color:var(--silver);text-decoration:none;font-size:0.85rem;font-weight:500;letter-spacing:0.05em;transition:color 0.2s}
    .nav-links a:hover,.nav-links a.active{color:var(--text)}
    .nav-cta{color:var(--gold);text-decoration:none;font-size:0.85rem;font-weight:600;border:1px solid var(--border);padding:0.45rem 1.2rem;border-radius:100px;transition:all 0.2s}
    .nav-cta:hover{background:var(--gold-dim);border-color:var(--gold)}
    .page-hero{position:relative;z-index:1;padding:10rem 2rem 5rem;text-align:center}
    .page-eyebrow{font-size:0.7rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;opacity:0.8}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,8vw,6rem);font-weight:300;font-style:italic;line-height:1;margin-bottom:1rem}
    .page-sub{color:var(--silver);font-weight:300;font-size:1rem;max-width:500px;margin:0 auto}
    .content{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 2rem 6rem}
    .releases-list{display:flex;flex-direction:column;gap:1.5rem;margin-top:3rem}

    /* Release row */
    .release-row{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;display:flex;gap:2rem;align-items:flex-start;transition:border-color 0.25s}
    .release-row:hover{border-color:var(--gold)}
    .release-cover{width:120px;height:120px;border-radius:12px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:3rem;flex-shrink:0;overflow:hidden}
    .release-cover img{width:100%;height:100%;object-fit:cover}
    .release-body{flex:1}
    .release-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;font-style:italic;line-height:1;margin-bottom:0.35rem}
    .release-artists{font-size:0.9rem;color:var(--gold);margin-bottom:0.25rem;font-weight:500}
    .release-meta{font-size:0.78rem;color:var(--muted);margin-bottom:1.25rem}
    .stream-buttons{display:flex;flex-wrap:wrap;gap:0.6rem}
    .stream-btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.5rem 1rem;border-radius:100px;font-size:0.8rem;font-weight:600;text-decoration:none;font-family:'Space Grotesk',sans-serif;transition:all 0.2s;border:1px solid}

    .btn-spotify{background:rgba(30,215,96,0.1);color:#1ED760;border-color:rgba(30,215,96,0.3)}
    .btn-spotify:hover{background:rgba(30,215,96,0.2)}
    .btn-apple{background:rgba(252,60,68,0.1);color:#FC3C44;border-color:rgba(252,60,68,0.3)}
    .btn-apple:hover{background:rgba(252,60,68,0.2)}
    .btn-beatport{background:rgba(0,190,255,0.1);color:#00BEFF;border-color:rgba(0,190,255,0.3)}
    .btn-beatport:hover{background:rgba(0,190,255,0.2)}
    .btn-youtube{background:rgba(255,0,0,0.1);color:#FF4444;border-color:rgba(255,0,0,0.3)}
    .btn-youtube:hover{background:rgba(255,0,0,0.2)}
    .btn-soundcloud{background:rgba(255,85,0,0.1);color:#FF5500;border-color:rgba(255,85,0,0.3)}
    .btn-soundcloud:hover{background:rgba(255,85,0,0.2)}
    .btn-tidal{background:rgba(255,255,255,0.06);color:var(--text);border-color:rgba(255,255,255,0.15)}
    .btn-tidal:hover{background:rgba(255,255,255,0.12)}
    .btn-amazon{background:rgba(255,153,0,0.1);color:#FF9900;border-color:rgba(255,153,0,0.3)}
    .btn-amazon:hover{background:rgba(255,153,0,0.2)}
    .btn-smart{background:var(--gold-dim);color:var(--gold);border-color:var(--border)}
    .btn-smart:hover{background:rgba(196,163,90,0.25)}

    .loading-state{text-align:center;padding:4rem;color:var(--muted)}
    footer{background:var(--surface);border-top:1px solid var(--border);position:relative;z-index:1}
    .footer-inner{max-width:1200px;margin:0 auto;padding:2rem;display:flex;justify-content:space-between;align-items:center}
    .footer-copy{font-size:0.78rem;color:var(--muted)}

    @media(max-width:768px){
      nav{padding:1rem 1.5rem}.nav-links{display:none}
      .release-row{flex-direction:column;gap:1rem}
      .release-cover{width:100%;height:200px}
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <nav>
    <a href="/" class="logo"><span class="logo-icon">☾</span><div class="logo-text"><span class="logo-main">LUNAR ETERNAL</span><span class="logo-sub">Music Group</span></div></a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/artists/">Artists</a>
      <a href="/releases/" class="active">Releases</a>
      <a href="/about/">About</a>
      <a href="/remix-contests/">Contests</a>
    </div>
    <a href="/about/#contact" class="nav-cta">Contact</a>
  </nav>
  <div class="page-hero">
    <p class="page-eyebrow">Discography</p>
    <h1 class="page-title">Releases</h1>
    <p class="page-sub" id="release-count">Loading catalog...</p>
  </div>
  <div class="content">
    <div class="releases-list" id="releases-list">
      <div class="loading-state">Loading releases...</div>
    </div>
  </div>
  <footer><div class="footer-inner"><span class="footer-copy">© 2024–2026 Lunar Eternal Music Group</span><span class="footer-copy">Guiding talent beyond the stars.</span></div></footer>

  <script>
    const WORKER_URL = 'https://alessia-portal-worker.musicrecordings123.workers.dev';

    const s = document.getElementById('stars');
    for(let i=0;i<120;i++){const el=document.createElement('div');el.className='star';const size=Math.random()<0.2?2:1;el.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--d:${2+Math.random()*5}s;--delay:${Math.random()*8}s;`;s.appendChild(el);}

    async function loadReleases() {
      try {
        const res = await fetch(WORKER_URL + '/label-releases');
        const releases = await res.json();
        const list = document.getElementById('releases-list');
        const countEl = document.getElementById('release-count');

        if (!releases?.length) {
          list.innerHTML = '<div class="loading-state">No releases yet — check back soon.</div>';
          countEl.textContent = 'Catalog coming soon.';
          return;
        }

        countEl.textContent = `${releases.length} release${releases.length !== 1 ? 's' : ''} and counting.`;

        list.innerHTML = releases.map(r => {
          const buttons = [
            r.spotify_url && `<a href="${r.spotify_url}" target="_blank" class="stream-btn btn-spotify">🎵 Spotify</a>`,
            r.apple_music_url && `<a href="${r.apple_music_url}" target="_blank" class="stream-btn btn-apple">🍎 Apple Music</a>`,
            r.beatport_url && `<a href="${r.beatport_url}" target="_blank" class="stream-btn btn-beatport">🎛 Beatport</a>`,
            r.youtube_url && `<a href="${r.youtube_url}" target="_blank" class="stream-btn btn-youtube">▶ YouTube</a>`,
            r.soundcloud_url && `<a href="${r.soundcloud_url}" target="_blank" class="stream-btn btn-soundcloud">☁ SoundCloud</a>`,
            r.tidal_url && `<a href="${r.tidal_url}" target="_blank" class="stream-btn btn-tidal">◈ Tidal</a>`,
            r.amazon_music_url && `<a href="${r.amazon_music_url}" target="_blank" class="stream-btn btn-amazon">📦 Amazon Music</a>`,
            r.hypeddit_url && `<a href="${r.hypeddit_url}" target="_blank" class="stream-btn btn-smart">🔗 All Platforms</a>`,
          ].filter(Boolean).join('');

          return `
            <div class="release-row">
              <div class="release-cover" id="rc-${r.id}">${r.cover_emoji || '🎵'}</div>
              <div class="release-body">
                <div class="release-title">${r.title}</div>
                <div class="release-artists">${r.artists}</div>
                <div class="release-meta">
                  ${r.genre ? r.genre : ''}
                  ${r.release_date ? ' · ' + new Date(r.release_date).toLocaleDateString('nl-NL', {day:'numeric',month:'long',year:'numeric'}) : ''}
                </div>
                <div class="stream-buttons">${buttons || '<span style="color:var(--muted);font-size:0.82rem">Streaming links coming soon</span>'}</div>
              </div>
            </div>`;
        }).join('');

        // Load cover art
        for (const r of releases) {
          if (!r.cover_key) continue;
          try {
            const res = await fetch(`${WORKER_URL}/file/${encodeURIComponent(r.cover_key)}`);
            if (!res.ok) continue;
            const blob = await res.blob();
            const el = document.getElementById(`rc-${r.id}`);
            if (el) el.innerHTML = `<img src="${URL.createObjectURL(blob)}" alt="${r.title}" />`;
          } catch(e) {}
        }
      } catch(e) {
        document.getElementById('releases-list').innerHTML = '<div class="loading-state">Could not load releases.</div>';
      }
    }

    loadReleases();
  </script>
</body>
</html>
